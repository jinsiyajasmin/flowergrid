# Coolify production
# Base Directory: /  |  Compose file: docker-compose.yaml  |  Public port: 80
#
# Set these in Coolify → your app → Environment Variables (same names as below).
# Coolify injects them into ${VAR_NAME} when the stack starts.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:80/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    environment:
      # --- Runtime (fixed for production image) ---
      NODE_ENV: production
      PORT: "4000"

      # --- Database (required) — use your Neon / Coolify Postgres URL ---
      DATABASE_URL: "${DATABASE_URL}"

      # --- Session (required) — long random string ---
      SESSION_SECRET: "${SESSION_SECRET}"

      # --- OpenAI (required for chat) ---
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      CHAT_MODEL: "${CHAT_MODEL:-gpt-4o}"
      EMBED_MODEL: "${EMBED_MODEL:-text-embedding-3-small}"

      # --- Google OAuth (required for sign-up) ---
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL:-https://luna.flowergrid.co.uk/api/auth/google/callback}"
      FRONTEND_URL: "${FRONTEND_URL:-https://luna.flowergrid.co.uk}"

      # Do NOT set VITE_API_BASE in Coolify (causes localhost API URLs in the browser).
