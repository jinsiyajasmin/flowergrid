# Coolify production compose — no bundled Postgres.
# In Coolify: set "Docker Compose Location" to docker-compose.coolify.yaml
# and configure environment variables (see .env.example / README).
#
# After deploy, point DATABASE_URL at your Coolify Postgres (or external DB),
# then redeploy so Prisma migrations run on startup.

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "4000"
    networks:
      - flowergrid
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://luna.flowergrid.co.uk/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-https://luna.flowergrid.co.uk}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty for single-domain deploy (relative API paths)
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - flowergrid

networks:
  flowergrid:
    driver: bridge
