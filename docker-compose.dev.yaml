# Local development only (Postgres + API + Vite dev).
# Do NOT point Coolify at this file — use docker-compose.yml (production).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flowergrid
      POSTGRES_PASSWORD: flowergrid
      POSTGRES_DB: flowergrid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowergrid -d flowergrid"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://flowergrid:flowergrid@postgres:5432/flowergrid?schema=public
      GOOGLE_CALLBACK_URL: http://localhost:4000/api/auth/google/callback
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: http://server:4000
    depends_on:
      - server

volumes:
  postgres_data:
